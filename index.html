<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>R.P.S game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="row">
      <div class="col">
        <div
          class="alert alert-warning alert-dismissible fade show"
          role="alert"
        >
          how to play? type in a username and select a image by clicking,confirm
          the selection by clicking play afterwards. scoring is based on the
          result of the rounds numbers will appear near human and chatgpt to
          reset the game click on clear results
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </div>
    <br />
    <br />
    <div class="row">
      <div class="photos-container" id="img-col">
        <img
          src="assets\9a013e8e90261fd5681043f87ef836d1-3936885194 1_edited.png"
          alt=""
          class="scissors-photo"
        />

        <img
          src="assets\declaration-of-independence 1_edited.png"
          alt=""
          class="paper-photo"
        />

        <img
          src="assets\symbolizing-lifes-challenges-sisyphus-endlessly-pushes-colossal-boulder-uphill_795881-13102 1_edited.png"
          alt=""
          class="rock-photo"
        />
      </div>
    </div>
    <br />
    <br />
    <div class="row">
      <!-- From Uiverse.io by anniekoop -->
      <input
        type="email"
        name="text"
        class="input"
        placeholder="username"
        id="username-input"
      />

      <p>results:</p>
      <div class="col">
        <img
          src="assets\Instagram-iOS-Blocked-Profile-Chat-768x618.jpg"
          alt=""
          class="human-photo"
        />
        <p>human:</p>
      </div>
      <div class="col">
        <img
          src="assets\system-artificial-intelligence-chatgpt-chat-bot-ai-technology-smart-robot-ai-chat-gpt-application-software-robot-application-chat-gpt-generative-ai_438099-13943_edited.png"
          alt=""
          class="gpt-photo"
        />
        <p>chatgpt:</p>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <!-- From Uiverse.io by WhiteNervosa -->
        <div class="customCheckBoxHolder">
          <input type="checkbox" id="play-bttn" class="customCheckBoxInput" />
          <label for="play-bttn" class="customCheckBoxWrapper">
            <div class="customCheckBox">
              <div class="inner">play</div>
            </div>
          </label>
        </div>
      </div>

      <div class="col">
        <div class="customCheckBoxHolder">
          <input
            type="checkbox"
            id="wipe-result-bttn"
            class="customCheckBoxInput"
          />
          <label for="wipe-result-bttn" class="customCheckBoxWrapper">
            <div class="customCheckBox">
              <div class="inner">clear results</div>
            </div>
          </label>
        </div>
      </div>
    </div>
    <script src="sandbox.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
